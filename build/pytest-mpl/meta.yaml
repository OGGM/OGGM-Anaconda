{% set name = "pytest-mpl" %}
{% set version = "0.180.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/OGGM/pytest-mpl-oggm/archive/refs/tags/v{{ version }}.tar.gz
  fn: {{ name }}-{{ version }}.tar.gz

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install --no-deps -vv .

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools >=80
    - setuptools_scm >=8
  run:
    - python >=3.10
    - pytest >=6.2.5
    - matplotlib-base
    - jinja2
    - packaging
    - importlib_resources
    - pillow

test:
  commands:
    - "pytest -p pytest_mpl_oggm.plugin --help"
    - "pytest -p pytest_mpl_oggm.plugin --help | grep mpl-oggm"

about:
  home: https://github.com/OGGM/pytest-mpl
  license: BSD 2-Clause
  license_family: BSD
  summary: 'pytest plugin to help with testing figures output from Matplotlib (OGGM fork)'
  dev_url: https://github.com/OGGM/pytest-mpl
